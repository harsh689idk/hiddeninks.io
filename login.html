<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiddenInk - Welcome Back</title>
    <link rel="stylesheet" href="style/main.css">
</head>
<body>
    <div class="auth-container">
        <div class="background-glow"></div>
        
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-glow">
                    <h1 class="brand-name">HiddenInk</h1>
                </div>
                <p class="welcome-text">Continue your learning journey</p>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="wave-group">
                    <input required="" type="text" class="input" id="loginEmail">
                    <span class="bar"></span>
                    <label class="label">
                        <span class="label-char" style="--index: 0">E</span>
                        <span class="label-char" style="--index: 1">m</span>
                        <span class="label-char" style="--index: 2">a</span>
                        <span class="label-char" style="--index: 3">i</span>
                        <span class="label-char" style="--index: 4">l</span>
                        <span class="label-char" style="--index: 5">&nbsp;</span>
                        <span class="label-char" style="--index: 6">o</span>
                        <span class="label-char" style="--index: 7">r</span>
                        <span class="label-char" style="--index: 8">&nbsp;</span>
                        <span class="label-char" style="--index: 9">U</span>
                        <span class="label-char" style="--index: 10">s</span>
                        <span class="label-char" style="--index: 11">e</span>
                        <span class="label-char" style="--index: 12">r</span>
                        <span class="label-char" style="--index: 13">&nbsp;</span>
                        <span class="label-char" style="--index: 14">I</span>
                        <span class="label-char" style="--index: 15">D</span>
                    </label>
                </div>

                <div class="wave-group">
                    <input required="" type="password" class="input" id="loginPassword">
                    <span class="bar"></span>
                    <label class="label">
                        <span class="label-char" style="--index: 0">P</span>
                        <span class="label-char" style="--index: 1">a</span>
                        <span class="label-char" style="--index: 2">s</span>
                        <span class="label-char" style="--index: 3">s</span>
                        <span class="label-char" style="--index: 4">w</span>
                        <span class="label-char" style="--index: 5">o</span>
                        <span class="label-char" style="--index: 6">r</span>
                        <span class="label-char" style="--index: 7">d</span>
                    </label>
                </div>

                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        Keep me signed in
                    </label>
                    <a href="#" class="forgot-link" id="forgotPassword">Forgot password?</a>
                </div>

                <button type="submit" class="auth-btn primary" id="loginButton">
                    <span class="btn-text">Sign In</span>
                    <div class="btn-loader">
                        <div class="loader"></div>
                    </div>
                </button>
            </form>

            <div class="divider">
                <span>New to HiddenInk?</span>
            </div>

            <a href="signup.html" class="auth-btn secondary">
                Create Account
            </a>
        </div>
    </div>

    <!-- ✅ Firebase SDK Import Block (Added) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBNFnHe7dJUmasaW_zXRSzqwqW_BLiegOc",
            authDomain: "hidden-inks.firebaseapp.com",
            projectId: "hidden-inks",
            storageBucket: "hidden-inks.firebasestorage.app",
            messagingSenderId: "169286628545",
            appId: "1:169286628545:web:b2d49198be402698ef1040"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();

        window._auth = auth; // Expose to LoginManager
    </script>

    <!-- Your Original Script (Only authenticateUser replaced) -->
    <script>
class LoginManager {
    constructor() {
        this.init();
    }

    init() {
        this.loginForm = document.getElementById('loginForm');
        this.loginEmail = document.getElementById('loginEmail');
        this.loginPassword = document.getElementById('loginPassword');
        this.loginButton = document.getElementById('loginButton');
        this.rememberMe = document.getElementById('rememberMe');
        this.forgotPassword = document.getElementById('forgotPassword');

        this.bindEvents();
        this.enhanceUX();
    }

    bindEvents() {
        this.loginForm.addEventListener('submit', (e) => this.handleLogin(e));
        this.forgotPassword.addEventListener('click', (e) => this.handleForgotPassword(e));
        this.setupInputAnimations();
    }

    setupInputAnimations() {
        const inputs = [this.loginEmail, this.loginPassword];
        
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', () => {
                if (!input.value) {
                    input.parentElement.classList.remove('focused');
                }
            });
        });
    }

    handleLogin(e) {
        e.preventDefault();
        
        if (this.validateForm()) {
            this.setLoadingState(true);
            this.authenticateUser();
        }
    }

    validateForm() {
        const email = this.loginEmail.value.trim();
        const password = this.loginPassword.value;

        let isValid = true;

        if (!email) {
            this.showError(this.loginEmail, 'Please enter your email or student ID');
            isValid = false;
        }

        if (!password) {
            this.showError(this.loginPassword, 'Please enter your password');
            isValid = false;
        }

        return isValid;
    }

    showError(input, message) {
        const formGroup = input.parentElement;
        this.clearError(input);
        input.classList.add('error');

        const errorElement = document.createElement('div');
        errorElement.className = 'error-message';
        errorElement.textContent = message;
        errorElement.style.cssText = `
            color: #ef4444;
            font-size: 14px;
            margin-top: 8px;
            font-weight: 500;
        `;
        
        formGroup.appendChild(errorElement);

        formGroup.style.animation = 'shake 0.5s ease-in-out';
        setTimeout(() => {
            formGroup.style.animation = '';
        }, 500);
    }

    clearError(input) {
        const formGroup = input.parentElement;
        const errorElement = formGroup.querySelector('.error-message');
        if (errorElement) errorElement.remove();
        input.classList.remove('error');
    }

    setLoadingState(loading) {
        if (loading) {
            this.loginButton.classList.add('loading');
            this.loginButton.disabled = true;
        } else {
            this.loginButton.classList.remove('loading');
            this.loginButton.disabled = false;
        }
    }

    /* ✅ REAL Firebase Login Added */
    async authenticateUser() {
        const email = this.loginEmail.value.trim();
        const password = this.loginPassword.value;

        try {
            const auth = window._auth;
            const userCred = await signInWithEmailAndPassword(auth, email, password);

            const idToken = await userCred.user.getIdToken();
            localStorage.setItem("idToken", idToken);

            this.showSuccessAnimation();
            setTimeout(() => {
                window.location.href = "index.html";
            }, 800);

        } catch (err) {
            this.setLoadingState(false);

            if (err.code === "auth/wrong-password" || err.code === "auth/invalid-credential") {
                this.showError(this.loginPassword, "Incorrect password");
            } 
            else if (err.code === "auth/user-not-found") {
                this.showError(this.loginEmail, "Account does not exist");
            }
            else {
                alert("Login failed: " + err.message);
            }
        }
    }

    showSuccessAnimation() {
        this.loginButton.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
        this.loginButton.querySelector('.btn-text').textContent = 'Welcome Back!';
        this.loginButton.style.transform = 'scale(0.98)';
        setTimeout(() => {
            this.loginButton.style.transform = 'scale(1)';
        }, 150);
    }

    handleForgotPassword(e) {
        e.preventDefault();
        
        const email = prompt('Enter your email to reset your password:');
        if (email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (emailRegex.test(email)) {
                alert('Password reset instructions have been sent to your email.');
            } else {
                alert('Please enter a valid email address.');
            }
        }
    }

    enhanceUX() {
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-8px); }
                75% { transform: translateX(8px); }
            }
        `;
        document.head.appendChild(style);

        setTimeout(() => {
            this.loginEmail.focus();
        }, 500);
    }
}

document.addEventListener('DOMContentLoaded', () => {
    new LoginManager();
});
</script>

</body>
</html>
